<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DocFlow{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f5f5f7;
      margin: 0;
      padding: 0;
    }
    a { color: #0071e3; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Nav ─────────────────────────────────────────────────────────────── */
    nav {
      background: #1d1d1f;
      color: #f5f5f7;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 48px;
    }
    nav .brand { font-weight: 700; font-size: 16px; color: #f5f5f7; }
    nav a { color: #a1a1a6; font-size: 13px; }
    nav a:hover { color: #f5f5f7; text-decoration: none; }
    nav .spacer { flex: 1; }
    nav form button {
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    nav form button:hover { background: #0077ed; }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .card h2 { margin: 0 0 16px; font-size: 16px; font-weight: 600; }

    /* ── Tables ──────────────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #6e6e73;
      border-bottom: 1px solid #e5e5ea;
      padding: 8px 12px;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f5; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    /* ── Status badges ───────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      border-radius: 100px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-error   { background: #fee2e2; color: #991b1b; }
    .badge-running { background: #fef3c7; color: #92400e; }
    .badge-photos  { background: #dbeafe; color: #1e40af; }
    .badge-email   { background: #ede9fe; color: #5b21b6; }
    .badge-s3      { background: #fef9c3; color: #78350f; }
    .badge-icloud  { background: #e0f2fe; color: #0c4a6e; }
    .badge-local   { background: #f1f5f9; color: #334155; }

    /* ── Tags ────────────────────────────────────────────────────────────── */
    .tag {
      display: inline-block;
      background: #f1f5f9;
      color: #475569;
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
      margin: 1px 2px 1px 0;
    }

    /* ── Forms ───────────────────────────────────────────────────────────── */
    .search-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }
    .search-bar input[type=text],
    .search-bar select {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      outline: none;
      background: white;
    }
    .search-bar input[type=text] { width: 260px; }
    .search-bar input[type=text]:focus,
    .search-bar select:focus { border-color: #0071e3; }
    .search-bar button {
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
    }
    .search-bar a.reset {
      font-size: 12px;
      color: #6e6e73;
    }

    /* ── Pagination ──────────────────────────────────────────────────────── */
    .pagination { display: flex; gap: 8px; margin-top: 16px; }
    .pagination a {
      border: 1px solid #e5e5ea;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      color: #0071e3;
    }

    /* ── Log output ──────────────────────────────────────────────────────── */
    pre.log {
      background: #1d1d1f;
      color: #e5e5ea;
      border-radius: 8px;
      padding: 16px;
      font-size: 12px;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty { text-align: center; color: #6e6e73; padding: 40px 0; }
    .empty .icon { font-size: 32px; margin-bottom: 8px; }

    /* ── Source icon ─────────────────────────────────────────────────────── */
    .source-icon { font-size: 16px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <span class="brand">📄 DocFlow</span>
  <a href="/">Dashboard</a>
  <a href="/documents">Dokumente</a>
  <a href="/settings">Einstellungen</a>
  <span class="spacer"></span>
  <form method="post" action="/runs/trigger">
    <button type="submit">▶ Jetzt ausführen</button>
  </form>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
