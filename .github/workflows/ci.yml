name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (macOS — matches production environment) ───────────────────
  test:
    name: Unit Tests (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest -m unit -v --tb=short
        # Note: E2E tests (-m e2e) are intentionally skipped in CI because:
        #   1. They require Apple Vision / osxphotos (macOS-only runtime deps)
        #   2. Some tests (S3/moto) need optional deps not installed by default
        #   3. Run `uv run pytest -m e2e` locally before releasing
        env:
          PYTHONPATH: src

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  # ── Lint + type check (ubuntu — faster, cheaper) ──────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: mypy type check
        run: uv run mypy src/docflow --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Type errors are warnings until fully annotated
