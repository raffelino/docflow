name: Security Audit

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:  # Allow manual trigger

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies + audit tools
        run: |
          uv sync --dev
          uv add --dev pip-audit bandit

      - name: Run pip-audit (dependency vulnerabilities)
        run: |
          uv run pip-audit --format=json --output=/tmp/pip_audit.json || true
          uv run pip-audit

      - name: Run bandit (static security analysis)
        run: |
          uv run bandit -r src/ --severity-level medium -f json -o /tmp/bandit.json || true
          uv run bandit -r src/ --severity-level medium

      - name: Check for hardcoded secrets
        run: |
          echo "=== Checking for hardcoded secrets ==="
          FOUND=0

          # Check for AWS key patterns
          if grep -rn "AKIA[A-Z0-9]\{16\}" src/ tests/ 2>/dev/null; then
            echo "WARNING: Possible AWS access key found"
            FOUND=1
          fi

          # Check for obvious API key assignments (not env var references)
          if grep -rn 'api_key\s*=\s*"[a-zA-Z0-9_\-]\{20,\}"' src/ tests/ 2>/dev/null; then
            echo "WARNING: Possible hardcoded API key found"
            FOUND=1
          fi

          # Ensure .env is gitignored
          if ! grep -q "^\.env$" .gitignore 2>/dev/null; then
            echo "WARNING: .env is not in .gitignore!"
            FOUND=1
          fi

          if [ $FOUND -eq 0 ]; then
            echo "✅ No hardcoded secrets detected"
          else
            echo "⚠️  Potential secrets found — review above"
            exit 1
          fi

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ github.run_id }}
          path: |
            /tmp/pip_audit.json
            /tmp/bandit.json
          retention-days: 90
